<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tycoon Mobile</title>
    <style>
        /* Mobile-First Dark Theme */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .header {
            text-align: center;
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #1e1b4b, #311042);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .balance {
            font-size: 2rem;
            font-weight: bold;
            color: #22c55e;
            margin: 5px 0;
        }

        .crypto-card {
            width: 100%;
            max-width: 400px;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        .crypto-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .crypto-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .crypto-price {
            font-size: 1.2rem;
            color: #e2e8f0;
        }

        .crypto-owned {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-buy { background-color: #22c55e; color: white; }
        .btn-sell { background-color: #ef4444; color: white; }
        .btn-mine { 
            background-color: #eab308; 
            color: #0f172a; 
            width: 100%; 
            max-width: 400px; 
            margin-bottom: 15px;
            padding: 15px;
            font-size: 1.2rem;
        }

        /* Alert/Feed Window for community buzz */
        .news-feed {
            width: 100%;
            max-width: 400px;
            background-color: #020617;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 0.85rem;
            color: #38bdf8;
            text-align: center;
            border-left: 4px solid #38bdf8;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>Available Cash</div>
        <div class="balance">$<span id="cash">100.00</span></div>
    </div>

    <!-- Tap to Mine Cash directly -->
    <button class="btn-mine" onclick="mineCash()">⚡ TAP TO MINE CASH</button>

    <!-- Coin 1: Bitcoin Simulation -->
    <div class="crypto-card">
        <div class="crypto-info">
            <div>
                <div class="crypto-name">🚀 MOON COIN</div>
                <div class="crypto-owned">Owned: <span id="coin-owned">0</span></div>
            </div>
            <div class="crypto-price">$<span id="coin-price">10.00</span></div>
        </div>
        <div class="btn-group">
            <button class="btn-buy" onclick="buyCoin()">BUY</button>
            <button class="btn-sell" onclick="sellCoin()">SELL</button>
        </div>
    </div>

    <!-- Live Market News Alert -->
    <div class="news-feed" id="news">Market is quiet... perfect time to invest!</div>

    <script>
        // Game State Variables
        let cash = parseFloat(localStorage.getItem('crypto_cash')) || 100.00;
        let coinsOwned = parseInt(localStorage.getItem('crypto_coins')) || 0;
        let coinPrice = 10.00;

        // Fun Alert Prompts to update live on phone
        const alerts = [
            "Viral meme goes live! Moon Coin surges!",
            "Major crypto exchange crash! Prices plummet!",
            "An anonymous whale just dumped billions!",
            "Influencer posts a video wearing a Moon Coin shirt!",
            "New regulations announced. Market panics!"
        ];

        // Core Functions
        function updateUI() {
            document.getElementById('cash').innerText = cash.toFixed(2);
            document.getElementById('coin-owned').innerText = coinsOwned;
            document.getElementById('coin-price').innerText = coinPrice.toFixed(2);
            
            // Save state on phone storage
            localStorage.setItem('crypto_cash', cash);
            localStorage.setItem('crypto_coins', coinsOwned);
        }

        function mineCash() {
            cash += 1.00;
            updateUI();
        }

        function buyCoin() {
            if (cash >= coinPrice) {
                cash -= coinPrice;
                coinsOwned += 1;
                updateUI();
            }
        }

        function sellCoin() {
            if (coinsOwned > 0) {
                cash += coinPrice;
                coinsOwned -= 1;
                updateUI();
            }
        }

        // Live Market engine updates prices every 3 seconds
        setInterval(() => {
            // Randomly change price up or down by up to 40%
            let changePercent = (Math.random() * 0.8) - 0.4; 
            coinPrice += coinPrice * changePercent;
            
            // Keep price from dropping to zero
            if (coinPrice < 1) coinPrice = 1.25;

            // 20% chance to update a crazy community news banner
            if (Math.random() < 0.25) {
                let randomAlert = alerts[Math.floor(Math.random() * alerts.length)];
                document.getElementById('news').innerText = randomAlert;
            }

            updateUI();
        }, 3000);

        // Run on startup
        updateUI();
    </script>
</body>
</html>
